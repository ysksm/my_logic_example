<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cardDev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="cardCi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="cardTest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="cardDebug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="cardPerf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#713f12"/>
      <stop offset="100%" stop-color="#854d0e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="2400" fill="url(#bgGrad)"/>

  <!-- Header -->
  <rect x="0" y="0" width="1600" height="180" fill="url(#headerGrad)"/>
  <text x="800" y="80" text-anchor="middle" font-size="44" font-weight="700" fill="#ffffff">AI 活用戦略 インフォグラフィック</text>
  <text x="800" y="130" text-anchor="middle" font-size="22" fill="#f1f5f9" letter-spacing="2">react-ts × Layered × DIP × DI × DDD</text>
  <text x="800" y="162" text-anchor="middle" font-size="16" fill="#e2e8f0" opacity="0.85">Dev Env / CI / Test / Debug / Performance</text>

  <!-- Architecture stack -->
  <g transform="translate(80,220)">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#f8fafc">▌前提アーキテクチャ</text>
    <rect x="0" y="20" width="1440" height="240" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>

    <!-- Layer stack -->
    <g transform="translate(40,50)">
      <rect x="0" y="0" width="640" height="44" rx="8" fill="#312e81" stroke="#6366f1"/>
      <text x="20" y="29" font-size="18" fill="#e0e7ff" font-weight="600">Presentation (React / hooks / Container)</text>
      <text x="620" y="29" text-anchor="end" font-size="14" fill="#a5b4fc">↓ depends on</text>

      <rect x="0" y="54" width="640" height="44" rx="8" fill="#1e3a8a" stroke="#3b82f6"/>
      <text x="20" y="83" font-size="18" fill="#dbeafe" font-weight="600">Application (UseCase / Port)</text>
      <text x="620" y="83" text-anchor="end" font-size="14" fill="#93c5fd">↓ depends on</text>

      <rect x="0" y="108" width="640" height="44" rx="8" fill="#064e3b" stroke="#10b981"/>
      <text x="20" y="137" font-size="18" fill="#d1fae5" font-weight="600">Domain (Entity / VO / DomainService / Repo IF)</text>
      <text x="620" y="137" text-anchor="end" font-size="14" fill="#6ee7b7">▲ DIP</text>

      <rect x="0" y="162" width="640" height="44" rx="8" fill="#7f1d1d" stroke="#ef4444"/>
      <text x="20" y="191" font-size="18" fill="#fee2e2" font-weight="600">Infrastructure (Repo 実装 / API / I/O)</text>
      <text x="620" y="191" text-anchor="end" font-size="14" fill="#fca5a5">implements ↑</text>
    </g>

    <!-- Principles -->
    <g transform="translate(740,50)">
      <text x="0" y="0" font-size="20" font-weight="700" fill="#facc15">基本原則</text>
      <text x="0" y="34" font-size="16" fill="#f1f5f9">① 境界越境コードは AI に書かせない</text>
      <text x="0" y="62" font-size="16" fill="#f1f5f9">② ユビキタス言語をプロンプト固定</text>
      <text x="0" y="90" font-size="16" fill="#f1f5f9">③ 生成物は 型 / 契約 / テスト で検証</text>
      <text x="0" y="118" font-size="16" fill="#f1f5f9">④ AI を「層内専門家」として分割活用</text>
      <rect x="0" y="140" width="640" height="48" rx="10" fill="#3f3f46" stroke="#facc15" stroke-dasharray="4 3"/>
      <text x="20" y="170" font-size="16" fill="#fef9c3" font-weight="600">⚠ AI 出力の前段に「決定論的検証」を必ず置く</text>
    </g>
  </g>

  <!-- 5 Domain Cards -->
  <g transform="translate(80,520)">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#f8fafc">▌5 領域での AI 活用</text>

    <!-- Card 1: Dev Env -->
    <g transform="translate(0,30)" filter="url(#shadow)">
      <rect width="450" height="380" rx="16" fill="url(#cardDev)"/>
      <circle cx="40" cy="40" r="22" fill="#ffffff" opacity="0.15"/>
      <text x="40" y="48" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">1</text>
      <text x="80" y="48" font-size="22" font-weight="700" fill="#ffffff">開発環境</text>
      <line x1="20" y1="72" x2="430" y2="72" stroke="#93c5fd" opacity="0.4"/>
      <g font-size="15" fill="#dbeafe">
        <text x="20" y="105">▸ 集約 / Entity / VO の雛形生成</text>
        <text x="20" y="135">▸ UseCase テンプレ + テストファイル一式</text>
        <text x="20" y="165">▸ React 画面 (Container/Presentational/hooks)</text>
        <text x="20" y="195">▸ CLAUDE.md でアーキ規約を IDE 常駐</text>
        <text x="20" y="225">▸ ADR 差分要約を PR 毎に自動生成</text>
        <text x="20" y="255">▸ 集約マップ → Mermaid 自動出力</text>
        <text x="20" y="285">▸ 型定義 → ユビキタス言語辞典を逆生成</text>
      </g>
      <rect x="20" y="310" width="410" height="50" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="35" y="332" font-size="13" fill="#fde68a" font-weight="600">KEY</text>
      <text x="35" y="352" font-size="13" fill="#f1f5f9">層境界を意識したリファクタ指示が肝</text>
    </g>

    <!-- Card 2: CI -->
    <g transform="translate(495,30)" filter="url(#shadow)">
      <rect width="450" height="380" rx="16" fill="url(#cardCi)"/>
      <circle cx="40" cy="40" r="22" fill="#ffffff" opacity="0.15"/>
      <text x="40" y="48" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">2</text>
      <text x="80" y="48" font-size="22" font-weight="700" fill="#ffffff">CI</text>
      <line x1="20" y1="72" x2="430" y2="72" stroke="#86efac" opacity="0.4"/>
      <g font-size="15" fill="#d1fae5">
        <text x="20" y="105">▸ 層越境 import を AI レビューで検出</text>
        <text x="20" y="135">▸ DIP 違反 (domain → axios 等) 検知</text>
        <text x="20" y="165">▸ ユビキタス言語ドリフト検出</text>
        <text x="20" y="195">▸ Entity setter / VO 不変性チェック</text>
        <text x="20" y="225">▸ Conventional Commits 自動生成</text>
        <text x="20" y="255">▸ PR 説明文 (影響レイヤ / 手動確認) 構造化</text>
        <text x="20" y="285">▸ リリースノートをドメインイベント単位で要約</text>
      </g>
      <rect x="20" y="310" width="410" height="50" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="35" y="332" font-size="13" fill="#fde68a" font-weight="600">KEY</text>
      <text x="35" y="352" font-size="13" fill="#f1f5f9">AI 出力は型 / テスト / 人間レビューでゲート</text>
    </g>

    <!-- Card 3: Test -->
    <g transform="translate(990,30)" filter="url(#shadow)">
      <rect width="450" height="380" rx="16" fill="url(#cardTest)"/>
      <circle cx="40" cy="40" r="22" fill="#ffffff" opacity="0.15"/>
      <text x="40" y="48" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">3</text>
      <text x="80" y="48" font-size="22" font-weight="700" fill="#ffffff">テスト</text>
      <line x1="20" y1="72" x2="430" y2="72" stroke="#fdba74" opacity="0.4"/>
      <g font-size="15" fill="#ffedd5">
        <text x="20" y="105">▸ domain: 不変条件 / VO 等価性を網羅生成</text>
        <text x="20" y="135">▸ usecase: ポート自動モック + GWT 強制</text>
        <text x="20" y="165">▸ presentation: role / label ベース取得</text>
        <text x="20" y="195">▸ 契約テスト (IF conformance)</text>
        <text x="20" y="225">▸ カバレッジ未到達行 → 追加ケース提案</text>
        <text x="20" y="255">▸ Stryker 生存ミュータント分析</text>
        <text x="20" y="285">▸ Gherkin → Playwright / fast-check Arbitrary</text>
      </g>
      <rect x="20" y="310" width="410" height="50" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="35" y="332" font-size="13" fill="#fde68a" font-weight="600">KEY</text>
      <text x="35" y="352" font-size="13" fill="#f1f5f9">層別に「何を検証すべきか」を AI に明示</text>
    </g>

    <!-- Card 4: Debug -->
    <g transform="translate(247,440)" filter="url(#shadow)">
      <rect width="450" height="380" rx="16" fill="url(#cardDebug)"/>
      <circle cx="40" cy="40" r="22" fill="#ffffff" opacity="0.15"/>
      <text x="40" y="48" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">4</text>
      <text x="80" y="48" font-size="22" font-weight="700" fill="#ffffff">デバッグ</text>
      <line x1="20" y1="72" x2="430" y2="72" stroke="#f9a8d4" opacity="0.4"/>
      <g font-size="15" fill="#fce7f3">
        <text x="20" y="105">▸ スタックトレース → 層越え呼び出し再構成</text>
        <text x="20" y="135">▸ error boundary で握り潰された例外抽出</text>
        <text x="20" y="165">▸ バグ報告文 → 失敗 vitest を先に生成</text>
        <text x="20" y="195">▸ Redux/Zustand 履歴から最小再現</text>
        <text x="20" y="225">▸ 構造化ログ (correlationId/aggregateId) 設計</text>
        <text x="20" y="255">▸ Sentry / OTel を UseCase 単位で要約</text>
        <text x="20" y="285">▸ CDP 連携で DOM/Network/Console 観測</text>
      </g>
      <rect x="20" y="310" width="410" height="50" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="35" y="332" font-size="13" fill="#fde68a" font-weight="600">KEY</text>
      <text x="35" y="352" font-size="13" fill="#f1f5f9">「再現テスト先行」が AI 活用の最短ルート</text>
    </g>

    <!-- Card 5: Performance -->
    <g transform="translate(742,440)" filter="url(#shadow)">
      <rect width="450" height="380" rx="16" fill="url(#cardPerf)"/>
      <circle cx="40" cy="40" r="22" fill="#ffffff" opacity="0.15"/>
      <text x="40" y="48" text-anchor="middle" font-size="24" fill="#ffffff" font-weight="700">5</text>
      <text x="80" y="48" font-size="22" font-weight="700" fill="#ffffff">パフォーマンス</text>
      <line x1="20" y1="72" x2="430" y2="72" stroke="#fde68a" opacity="0.4"/>
      <g font-size="15" fill="#fef3c7">
        <text x="20" y="105">▸ Web Vitals (LCP/INP/CLS) 改善優先度</text>
        <text x="20" y="135">▸ bundle visualizer → 重複依存検出</text>
        <text x="20" y="165">▸ React Profiler → 再描画発生源特定</text>
        <text x="20" y="195">▸ memo / useMemo の過不足判定</text>
        <text x="20" y="225">▸ React.lazy によるルート分割提案</text>
        <text x="20" y="255">▸ N+1 / 無駄 polling / serialize コスト検出</text>
        <text x="20" y="285">▸ CI で予算超過時に AI が原因 PR コメント</text>
      </g>
      <rect x="20" y="310" width="410" height="50" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="35" y="332" font-size="13" fill="#fde68a" font-weight="600">KEY</text>
      <text x="35" y="352" font-size="13" fill="#f1f5f9">計測データを AI に渡し「優先順位」を出させる</text>
    </g>
  </g>

  <!-- Roadmap -->
  <g transform="translate(80,1920)">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#f8fafc">▌段階導入ロードマップ</text>
    <rect x="0" y="20" width="1440" height="180" rx="14" fill="#0b1220" stroke="#334155"/>

    <!-- Phase boxes -->
    <g transform="translate(40,50)">
      <!-- connecting line -->
      <line x1="65" y1="60" x2="1295" y2="60" stroke="#475569" stroke-width="2" stroke-dasharray="6 4"/>

      <!-- Phase 1 -->
      <circle cx="65" cy="60" r="32" fill="#6366f1" stroke="#c7d2fe" stroke-width="3"/>
      <text x="65" y="68" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">P1</text>
      <text x="65" y="120" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">IDE 補完 / コミット</text>
      <text x="65" y="140" text-anchor="middle" font-size="12" fill="#94a3b8">低リスクから着手</text>

      <!-- Phase 2 -->
      <circle cx="320" cy="60" r="32" fill="#3b82f6" stroke="#bfdbfe" stroke-width="3"/>
      <text x="320" y="68" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">P2</text>
      <text x="320" y="120" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">テスト / リファクタ</text>
      <text x="320" y="140" text-anchor="middle" font-size="12" fill="#94a3b8">domain層提案</text>

      <!-- Phase 3 -->
      <circle cx="575" cy="60" r="32" fill="#10b981" stroke="#a7f3d0" stroke-width="3"/>
      <text x="575" y="68" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">P3</text>
      <text x="575" y="120" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">CI 自動レビュー</text>
      <text x="575" y="140" text-anchor="middle" font-size="12" fill="#94a3b8">層越境 / DIP 検知</text>

      <!-- Phase 4 -->
      <circle cx="900" cy="60" r="32" fill="#f59e0b" stroke="#fde68a" stroke-width="3"/>
      <text x="900" y="68" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">P4</text>
      <text x="900" y="120" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">パフォーマンス自動化</text>
      <text x="900" y="140" text-anchor="middle" font-size="12" fill="#94a3b8">回帰原因 → 自動 PR</text>

      <!-- Phase 5 -->
      <circle cx="1295" cy="60" r="32" fill="#ec4899" stroke="#fbcfe8" stroke-width="3"/>
      <text x="1295" y="68" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">P5</text>
      <text x="1295" y="120" text-anchor="middle" font-size="14" fill="#e2e8f0" font-weight="600">ドメインモデリング</text>
      <text x="1295" y="140" text-anchor="middle" font-size="12" fill="#94a3b8">EventStorming 草案</text>
    </g>
  </g>

  <!-- Footer / Summary band -->
  <g transform="translate(80,2160)">
    <rect width="1440" height="180" rx="14" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
    <text x="40" y="42" font-size="22" font-weight="700" fill="#fbbf24">▌Take-aways</text>

    <g font-size="15" fill="#e0e7ff">
      <text x="40" y="78">✓ DDD + レイヤード + DIP + DI は「責務分割した AI 指示」と相性が良い</text>
      <text x="40" y="106">✓ コンテキストに「層 × ユビキタス言語 × 契約 (型/IF)」を固定する</text>
      <text x="40" y="134">✓ AI 出力の前段に「決定論的検証 (型 / テスト / 静的解析)」を必ず置く</text>
      <text x="40" y="162">✓ AI は「設計判断の補助」と「反復作業の自動化」の二刀流で使う</text>
    </g>
  </g>

  <!-- Page footer -->
  <text x="800" y="2385" text-anchor="middle" font-size="11" fill="#64748b">my_logic_example / docs/ai-integration-strategies.infographic.svg</text>
</svg>
