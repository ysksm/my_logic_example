[server]
listen_addr = "0.0.0.0:9093"

[storage]
retention_samples = 720          # 15s × 3h

[[scrape_configs]]
job_name        = "m_exporter_go"
scrape_interval = "15s"
scrape_timeout  = "10s"
metrics_path    = "/metrics"
targets         = ["localhost:9100"]

[[scrape_configs]]
job_name        = "m_exporter_rust"
scrape_interval = "15s"
scrape_timeout  = "10s"
metrics_path    = "/metrics"
targets         = ["localhost:9101"]
