// pcap-go IDL — single source of truth for backend ⇄ frontend communication.
//
// Wire format: JSON over HTTP (REST) and JSON-encoded messages over WebSocket.
// Field names use snake_case on the wire (matches protojson defaults).
//
// Hand-maintained Go types live in core/models.go.
// Hand-maintained TS types live in frontend/src/domain/idl.ts.
// Both files MUST be kept in sync with this schema.

syntax = "proto3";

package pcap;

// ---------- Resources ----------

message NetworkInterface {
  string name = 1;          // e.g. "en0"
  string description = 2;   // human-readable
  repeated string addresses = 3;
  bool is_loopback = 4;
  bool is_up = 5;
}

message Packet {
  uint64 seq = 1;                // monotonic per-session sequence
  string captured_at = 2;        // RFC3339 nano
  uint32 length = 3;             // wire length
  uint32 capture_length = 4;     // bytes actually captured
  string interface = 5;
  string link_layer = 6;         // "Ethernet", "Loopback", ...
  string network_layer = 7;      // "IPv4", "IPv6", ""
  string transport_layer = 8;    // "TCP", "UDP", "ICMPv4", ""
  string application_layer = 9;  // "DNS", "HTTP", ""
  string src = 10;               // best-effort src "ip:port" or "mac"
  string dst = 11;               // best-effort dst
  string summary = 12;           // single-line description
  bytes  payload = 13;           // optional, base64 in JSON
  Layers layers = 14;            // per-layer structured detail
}

message Layers {
  EthernetLayer ethernet = 1;
  IPLayer        ip      = 2;
  TCPLayer       tcp     = 3;
  UDPLayer       udp     = 4;
  ICMPLayer      icmp    = 5;
  DNSLayer       dns     = 6;
  HTTPLayer      http    = 7;
  TLSLayer       tls     = 8;
}

message EthernetLayer {
  string src_mac    = 1;
  string dst_mac    = 2;
  string src_vendor = 3;   // resolved via OUI; "" when unknown
  string dst_vendor = 4;
  string ether_type = 5;   // "IPv4", "IPv6", "ARP", ...
}

message IPLayer {
  uint32 version       = 1;   // 4 or 6
  string src           = 2;
  string dst           = 3;
  uint32 ttl           = 4;   // hop_limit for IPv6
  uint32 protocol      = 5;
  string protocol_name = 6;   // "TCP", "UDP", "ICMP", ...
  uint32 length        = 7;
  string flags         = 8;   // "DF", "MF", ...
}

message TCPLayer {
  uint32 src_port = 1;
  uint32 dst_port = 2;
  uint32 seq      = 3;
  uint32 ack      = 4;
  uint32 window   = 5;
  string flags    = 6;   // "SYN,ACK"
  uint32 length   = 7;   // payload length
}

message UDPLayer {
  uint32 src_port = 1;
  uint32 dst_port = 2;
  uint32 length   = 3;
}

message ICMPLayer {
  string type = 1;   // "EchoRequest", "EchoReply", ...
  uint32 code = 2;
}

message DNSLayer {
  string opcode    = 1;
  bool   response  = 2;
  string rcode     = 3;
  repeated string questions = 4;  // qname/qtype list
  repeated string answers   = 5;  // string-form RRs
}

message HTTPLayer {
  string method      = 1;   // request only
  string path        = 2;
  string host        = 3;
  uint32 status_code = 4;   // response only
  string user_agent  = 5;
  string content_type = 6;
}

message TLSLayer {
  string version    = 1;   // "TLS 1.2", "TLS 1.3", ...
  string handshake  = 2;   // "ClientHello", "ServerHello", ...
  string sni        = 3;
}

message Peer {
  string kind        = 1;   // "ip" | "mac"
  string address     = 2;   // IP or MAC string
  string vendor      = 3;   // for MAC peers
  uint64 packets     = 4;
  uint64 bytes       = 5;
  uint64 sent        = 6;   // packets observed as src
  uint64 received    = 7;   // packets observed as dst
  string first_seen  = 8;
  string last_seen   = 9;
  string owner       = 10;  // for ip peers: matched cloud/service owner ("AWS:EC2", "GCP", ...)
}

message ProtocolStat {
  string name  = 1;   // "TCP" / "UDP" / "ICMPv4" / "OTHER"
  uint64 count = 2;
  uint64 bytes = 3;
}

message RateBucket {
  string ts    = 1;   // RFC3339 of bucket start (1s granularity)
  uint64 count = 2;
  uint64 bytes = 3;
}

message StatsResponse {
  uint64 total_packets = 1;
  uint64 total_bytes   = 2;
  repeated ProtocolStat transport   = 3;   // by transport layer
  repeated ProtocolStat application = 4;   // by application layer
  repeated Peer top_peers = 5;             // top-N by packets
  repeated RateBucket rate = 6;            // last 60s
}

message ListPeersResponse {
  repeated Peer peers = 1;
}

message OUIResponse {
  string mac    = 1;
  string vendor = 2;
}

// ---------- IP ranges + reverse DNS ----------

message IPRangesProvider {
  string name        = 1;   // "AWS", "GCP", ...
  uint32 entries     = 2;   // number of CIDRs from this provider
  string source      = 3;   // "embedded" | "user-file" | "fetched"
}

message IPRangesStatus {
  uint32 total_entries     = 1;
  string user_file_path    = 2;   // path to user-overridable file (may not exist)
  bool   user_file_present = 3;
  string user_file_updated = 4;   // RFC3339 of user-file mtime, if present
  repeated IPRangesProvider providers = 5;
}

message IPRangesUpdateResponse {
  IPRangesStatus status      = 1;
  repeated string errors     = 2;   // per-provider fetch errors, if any
  uint32 fetched_total       = 3;   // total CIDRs written to user file
}

message ReverseDNSResponse {
  string ip      = 1;
  repeated string names = 2;   // PTR results
  string error   = 3;          // empty on success
}

message CaptureSession {
  string id = 1;
  string interface = 2;
  string bpf_filter = 3;
  uint32 snaplen = 4;
  bool promiscuous = 5;
  string state = 6;        // "running" | "stopped" | "error"
  string started_at = 7;
  string stopped_at = 8;
  uint64 packet_count = 9;
  string error = 10;
}

// ---------- Requests / Responses ----------

message ListInterfacesResponse {
  repeated NetworkInterface interfaces = 1;
}

message StartCaptureRequest {
  string interface = 1;
  string bpf_filter = 2;   // e.g. "tcp port 80"
  uint32 snaplen = 3;      // default 65535
  bool promiscuous = 4;
}

message StartCaptureResponse {
  CaptureSession session = 1;
}

message StopCaptureResponse {
  CaptureSession session = 1;
}

message ListSessionsResponse {
  repeated CaptureSession sessions = 1;
}

message ListPacketsRequest {
  string session_id = 1;
  uint64 after_seq = 2;   // return packets with seq > after_seq
  uint32 limit = 3;       // default 200
}

message ListPacketsResponse {
  repeated Packet packets = 1;
  uint64 next_seq = 2;
}

// ---------- WebSocket stream ----------

message StreamEnvelope {
  string type = 1;        // "packet" | "session" | "error"
  Packet packet = 2;
  CaptureSession session = 3;
  string message = 4;
}
